<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="planet" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#ff8eb0"/>
      <stop offset="40%"  stop-color="#ff5f8a"/>
      <stop offset="75%"  stop-color="#803ca1"/>
      <stop offset="100%" stop-color="#3a1e7a"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6c7cff" stop-opacity="0.2"/>
      <stop offset="50%"  stop-color="#68a3e5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6c7cff" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="80" fill="#0a0520"/>

  <!-- starfield -->
  <circle cx="60"  cy="80"  r="2" fill="#fff" opacity="0.7"/>
  <circle cx="440" cy="60"  r="3" fill="#fff" opacity="0.8"/>
  <circle cx="470" cy="150" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="80"  cy="420" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="420" cy="440" r="2.5" fill="#fff" opacity="0.8"/>
  <circle cx="50"  cy="260" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="460" cy="280" r="1.5" fill="#fff" opacity="0.5"/>

  <!-- ring (behind planet) -->
  <g transform="rotate(-22 256 256)">
    <ellipse cx="256" cy="256" rx="220" ry="48" fill="none" stroke="url(#ring)" stroke-width="10"/>
  </g>

  <!-- planet -->
  <circle cx="256" cy="256" r="150" fill="url(#planet)"/>

  <!-- ring (front portion, painted on top of planet's lower half) -->
  <g transform="rotate(-22 256 256)">
    <path d="M 36 256 A 220 48 0 0 0 476 256" fill="none" stroke="url(#ring)" stroke-width="10" opacity="0.85"/>
  </g>

  <!-- question mark -->
  <text x="256" y="320" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="180" font-weight="900" fill="#ffffff">?</text>
</svg>
